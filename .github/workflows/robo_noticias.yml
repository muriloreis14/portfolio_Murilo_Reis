name: Robô de Notícias

on:
  # Define que o robô roda sozinho a cada 4 horas
  schedule:
    - cron: '0 */4 * * *' 
  
  # Cria o botão no GitHub para você rodar manualmente
  workflow_dispatch: 

# Dá permissão para o robô salvar arquivos no repositório
permissions:
  contents: write 

jobs:
  atualizar-dados:
    runs-on: ubuntu-latest

    steps:
    # 1. Baixa os arquivos do seu repositório para a máquina virtual
    - name: Clonar o repositório
      uses: actions/checkout@v4

    # 2. Prepara o Python
    - name: Configurar o Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # 3. Instala dependências (Mantivemos o yfinance caso precise no futuro)
    - name: Instalar dependências
      run: |
        pip install yfinance
        
    # 4. Roda o script que você criou
    - name: Executar o robô de notícias
      run: python atualiza_noticias.py

    # 5. Salva a nova pasta gerada e envia para o GitHub de forma segura
    - name: Commit e Push dos resultados
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        # Pega a pasta inteira, não apenas os arquivos json
        git add base_de_dados/noticias/
        
        # O '|| echo' evita a tela vermelha caso já esteja tudo atualizado e sem matérias novas
        git commit -m "Atualizando base de notícias via GitHub Actions" || echo "Sem alterações para commit"
        git push

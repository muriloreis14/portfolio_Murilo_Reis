<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Econômico | Visão Geral</title>
    <!-- O link abaixo conectará o HTML ao visual (Dark Mode) que faremos depois -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Menu de Navegação -->
    <nav class="menu-superior">
        <div class="logo">Uma Nova Economia</div>
        <ul class="abas">
            <li><a href="index.html" class="ativo">Home</a></li>
            <li><a href="ativos.html">Análise de Ativos</a></li>
            <li><a href="preditivos.html">Modelos Preditivos</a></li>
            <li><a href="metodologia.html">Metodologia</a></li>
        </ul>
    </nav>

    <!-- Conteúdo Principal da Home -->
    <main class="conteudo">
        <header>
            <h1>Visão Geral do Mercado</h1>
            <p>Acompanhamento de indicadores econômicos e bolsa de valores atualizados de hora em hora.</p>
        </header>

        <!-- Espaço onde colocaremos os primeiros resumos/cards numéricos -->
        <section class="cards-resumo">
            <div class="card">
                <h3>IBOVESPA</h3>
                <p class="valor" id="valor-ibov">Carregando...</p>
            </div>
            <div class="card">
                <h3>Taxa Selic</h3>
                <p class="valor" id="valor-selic">Carregando...</p>
            </div>
        </section>

        <!-- Seção do Gráfico com a Caixa de Seleção -->
        <section class="grafico-container">
            <div class="cabecalho-grafico">
                <h2>Análise Histórica</h2>
                <select id="seletor-indicador" class="caixa-selecao">
                    <!-- O valor (value) aponta para a pasta onde o Python salva o JSON -->
                    <option value="base_de_dados/historico_ibov.json">IBOVESPA</option>
                    <option value="historico_selic.json">Taxa Selic</option>
                    <option value="historico_pib.json">PIB Trimestral</option>
                    <option value="historico_inflacao.json">Inflação (IPCA)</option>
                </select>
            </div>
            <canvas id="graficoPib"></canvas>
        </section>
    </main>

    <!-- Importando o Chart.js e conectando o nosso script -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="script.js"></script>
</body>
</html>

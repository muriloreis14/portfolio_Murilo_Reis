name: Atualização Diária de Indicadores e Ativos

# Define quando o robô vai rodar
on:
  schedule:
    # Roda todos os dias às 21:00 UTC (18:00 no horário de Brasília)
    - cron: '0 21 * * *'
  workflow_dispatch: # Permite que você rode o robô manualmente clicando em um botão no GitHub

jobs:
  build:
    runs-on: ubuntu-latest
    
    # Permissões necessárias para o robô alterar arquivos no seu repositório
    permissions:
      contents: write

    steps:
      # 1. Baixa o código do seu repositório para a máquina virtual
      - name: Checkout do repositório
        uses: actions/checkout@v4

      # 2. Instala o Python
      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 3. Instala as bibliotecas necessárias para extração e cálculos
      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas requests

      # 4. Executa o script de Macroeconomia (IPEA/BC)
      - name: Atualizar Indicadores Macro
        run: python atualiza_acoes.py

      # 5. Executa o script de Ações (Yahoo Finance - Histórico Máximo)
      # Este é o script que criará os arquivos individuais na pasta base_de_dados/ativos
      - name: Atualizar Histórico de Ativos
        run: python atualiza_acoes.py

      # 6. Salva as alterações e envia de volta para o seu GitHub
      - name: Commit e Push das atualizações
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add base_de_dados/*.json
          git add base_de_dados/ativos/*.json
          # O comando abaixo evita erro caso não haja mudanças nos dados
          git commit -m "Atualização multi-indicadores e ativos: $(date +'%Y-%m-%d')" || echo "Sem alterações para commitar"
          git push
